name: CI

# Quality gate for the static site. Cloudflare handles deploys via its Git
# integration; this workflow only verifies the build, types, internal links,
# and a Lighthouse budget — it does NOT deploy.
on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref to keep things tidy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build, check, links & Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Astro 6 requires Node >= 22.12
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (astro check)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check internal links
        run: npm run check:links

      - name: Lighthouse budget
        run: npm run lhci
